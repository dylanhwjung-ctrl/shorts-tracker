name: 가비지 컬렉션 (7일 초과 데이터 삭제)

on:
  schedule:
    - cron: '0 18 * * *'   # 매일 UTC 18시 (한국시간 새벽 3시)
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  garbage-collect:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 오래된 데이터 삭제
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python database/garbage_collector.py
