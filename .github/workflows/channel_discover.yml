name: 채널 발굴 자동 실행

on:
  schedule:
    - cron: '0 1 * * 1'   # 매주 월요일 UTC 1시 (한국시간 월요일 오전 10시)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 채널 발굴 실행 (engineering)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python crawlers/channel_crawler.py discover engineering

      - name: 채널 발굴 실행 (gaming)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python crawlers/channel_crawler.py discover gaming
