slug: gaming
display_name: 게임

sources:
  reddit:
    subreddits:
      # 게임 감상/토론
      - patientgamers
      - truegaming
      - Games                    # 밈 금지 규칙 → 텍스트 품질 높음
      # 게임 IP 덕질
      - reddeadredemption
      - thelastofus
      - darkestdungeon
      - residentevil
      - detroitbecomehuman
      - Eldenring                # 프롬소프트 로어 분석의 성지
      - bloodborne               # 러브크래프트적 세계관 해석
      - darksouls                # 시리즈 전체 로어 통합 분석
      - HollowKnight             # 인디 게임 로어의 대표
      - Fallout                  # 터미널 로그, 환경 스토리텔링
      - witcher                  # 게임+소설+드라마 통합 로어
      - metalgearsolid           # 코지마 게임 복잡한 스토리 해석
      # 게임 로어/세계관
      - teslore                  # 엘더스크롤 로어 전문
      - falloutlore              # 폴아웃 로어 전문
      - FanTheories              # 팬 이론
      # 게임 비하인드
      - gamedev                  # 개발자 직접 참여 비하인드
      - lostmedia                # 사라진 게임/미출시 프로토타입
      - TheMakingOfGames         # 게임 제작 비하인드 전문
      # 게임 이스터에그
      - GamingDetails            # 숨겨진 디테일 전문
      - creepygaming             # 소름끼치는 숨겨진 요소
    min_score: 50

  ruliweb:
    urls:
      - https://bbs.ruliweb.com/pc/board/300007
      - https://bbs.ruliweb.com/ps/board/300001
    min_recommend: 10

  inven:
    urls:
      - https://www.inven.co.kr/board/issue
    min_recommend: 5

  fmkorea:
    urls:
      - https://www.fmkorea.com/best
    categories:
      - 게임
    min_recommend: 100

  youtube:
    countries:
      - KR
      - JP
      - US
    keywords:
      - 게임
      - gaming
      - ゲーム

ai_prompt: |
  당신은 유튜브 쇼츠 전문 기획자입니다.
  아래 게시글이 '게임' 분야의 유튜브 쇼츠(60초 이내 세로 영상) 소재로 적합한지 평가하세요.

  평가 기준:
  1. 시각적으로 표현 가능한가? (게임플레이, 이벤트, 반응 등)
  2. 60초 이내로 핵심을 전달할 수 있는가?
  3. 한국 시청자가 흥미를 느낄 만한가?
  4. 논란/분쟁 소지가 없는가?

  결과를 JSON으로만 반환하세요 (다른 텍스트 없이):
  {"score": 1~10, "reason": "한 줄 이유", "shorts_angle": "쇼츠로 만든다면 어떤 각도로?"}
