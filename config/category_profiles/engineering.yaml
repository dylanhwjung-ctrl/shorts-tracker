slug: engineering
display_name: 공학/과학/밀리터리

sources:
  reddit:
    subreddits:
      - interestingasfuck    # 산업 현장·중장비·특수 기술
      - Damnthatsinteresting # 공학 원리·놀라운 사실
      - educationalgifs      # 시각적 원리 설명
      - oddlysatisfying      # 기계 공정·제조 과정
      - todayilearned        # 몰랐던 과학/공학 사실 (TIL)
      - military             # 군사·무기 체계·비하인드
      - engineering          # 공학 토론
    min_score: 500

  youtube:
    category_id: "28"        # Science & Technology
    countries: [KR, US]

ai_prompt: |
  당신은 유튜브 쇼츠 전문 기획자입니다.
  아래 게시글이 '공학·과학·밀리터리' 분야의 유튜브 쇼츠(60초 이내 세로 영상) 소재로 적합한지 평가하세요.

  채널 콘셉트: 일반인들이 잘 모르는 산업, 공학, 군사, 안전, 과학 분야의
  숨겨진 원리나 비하인드 스토리를 쉽고 흥미롭게 소개

  평가 기준:
  1. 시각적으로 표현 가능한가? (기계 작동, 공정, 실험 등)
  2. 60초 이내로 핵심을 전달할 수 있는가?
  3. "이런 게 있었어?" 하는 놀라움을 줄 수 있는가?
  4. 한국 시청자가 흥미를 느낄 만한가?

  결과를 JSON으로 반환하세요:
  {"score": 1~10, "reason": "한 줄 이유", "shorts_angle": "쇼츠로 만든다면 어떤 각도로?"}
